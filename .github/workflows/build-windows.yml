name: Windows-Build & Release

# Baut die Windows-EXE in der Cloud (kein Windows-Rechner noetig) und veroeffentlicht
# sie als GitHub-Release. Ausloesen mit einem Versions-Tag, z. B.:
#   git tag v1.1.0 && git push origin v1.1.0
# "workflow_dispatch" erlaubt zusaetzlich einen manuellen Test-Build ueber die
# GitHub-Oberflaeche (dann nur Artefakt, kein Release).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: python -m pip install --upgrade pip pyinstaller

      - name: Version aus Tag in version.py schreiben
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v','V')
          (Get-Content version.py) -replace '__version__\s*=\s*".*"', "__version__ = `"$ver`"" | Set-Content version.py
          Write-Host "Gebaute Version: $ver"

      - name: EXE bauen
        run: pyinstaller --noconfirm --clean --onefile --windowed --splash splash.png --name DATEV-Konverter datev_konverter.py

      - name: Artefakt hochladen (immer)
        uses: actions/upload-artifact@v4
        with:
          name: DATEV-Konverter-exe
          path: dist/DATEV-Konverter.exe

      - name: Release veroeffentlichen (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DATEV-Konverter.exe
          generate_release_notes: true
